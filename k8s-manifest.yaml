apiVersion: v1
kind: Namespace
metadata:
  name: telemetry-stack
  labels:
    app.kubernetes.io/name: telemetry-pipeline
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: timescaledb
  namespace: telemetry-stack
  labels:
    app: timescaledb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: timescaledb
  template:
    metadata:
      labels:
        app: timescaledb
    spec:
      containers:
        - name: timescaledb
          image: timescale/timescaledb:latest-pg15
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASSWORD
              value: "password"
            - name: POSTGRES_DB
              value: "telemetry_db"
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
            requests:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: timescaledb
  namespace: telemetry-stack
  labels:
    app: timescaledb
spec:
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  selector:
    app: timescaledb
  type: ClusterIP
---
# 2. APACHE KAFKA BROKER ARCHITECTURE (REPAIRED & LEAN)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: telemetry-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
      - name: kafka
        image: apache/kafka:latest
        ports:
        - containerPort: 9092
        env:
        - name: KAFKA_NODE_ID
          value: "1"
        - name: KAFKA_PROCESS_ROLES
          value: "broker,controller"
        - name: KAFKA_LISTENERS
          value: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
        - name: KAFKA_ADVERTISED_LISTENERS
          value: "PLAINTEXT://kafka:9092"
        - name: KAFKA_CONTROLLER_LISTENER_NAMES
          value: "CONTROLLER"
        - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
          value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
        - name: KAFKA_CONTROLLER_QUORUM_VOTERS
          value: "1@127.0.0.1:9093"
        - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
          value: "1"
        - name: KAFKA_LOG_DIRS
          value: "/tmp/kraft-combined-logs"
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: telemetry-stack
spec:
  ports:
  - name: broker
    port: 9092
    targetPort: 9092
  selector:
    app: kafka
---
# 3. GO INGESTION GATEWAY DEPLOYMENT
apiVersion: apps/v1
kind: Deployment
metadata:
  name: telemetry-ingestion
  namespace: telemetry-stack
  labels:
    app: telemetry-ingestion
spec:
  replicas: 1
  selector:
    matchLabels:
      app: telemetry-ingestion
  template:
    metadata:
      labels:
        app: telemetry-ingestion
    spec:
      containers:
        - name: telemetry-ingestion
          image: telemetry-ingestion:v1
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: KAFKA_BROKER
              value: "kafka:9092"
          resources:
            limits:
              cpu: 250m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: telemetry-ingestion-svc
  namespace: telemetry-stack
  labels:
    app: telemetry-ingestion
spec:
  type: NodePort
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
      protocol: TCP
      name: http
  selector:
    app: telemetry-ingestion
---
# 4. PYTHON WORKER PIPELINE ENGINE
apiVersion: apps/v1
kind: Deployment
metadata:
  name: telemetry-worker
  namespace: telemetry-stack
  labels:
    app: telemetry-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: telemetry-worker
  template:
    metadata:
      labels:
        app: telemetry-worker
    spec:
      containers:
        - name: telemetry-worker
          image: telemetry-worker:v1
          imagePullPolicy: Never
          env:
            - name: KAFKA_BROKER
              value: "kafka:9092"
            - name: DB_HOST
              value: "timescaledb"
          resources:
            limits:
              cpu: 250m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi